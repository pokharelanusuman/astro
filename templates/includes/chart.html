<div class="w-full flex flex-col gap-4">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {% for h_num in range(1, 13) %}
            <div id="house-card-{{ h_num }}" 
                 onclick="toggleHouseTree({{ h_num }})"
                 class="bg-slate-50 border border-slate-200 hover:border-indigo-300 rounded-2xl p-4 transition-all duration-200 cursor-pointer group flex flex-col gap-3 relative overflow-hidden shadow-sm">
                
                <div class="flex justify-between items-center relative z-10">
                    <div class="flex items-center gap-2">
                        <span class="font-mono text-xs font-bold text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">H{{ h_num }}</span>
                        <span class="text-xs font-medium text-slate-600 group-hover:text-slate-900 transition-colors">
                            {% if h_num == 1 %}Ascendant (Lagna){% else %}Sector {{ h_num }}{% endif %}
                        </span>
                    </div>
                    <span class="sign-label font-mono text-[11px] font-black tracking-wider text-slate-400 group-hover:text-indigo-600 transition-colors uppercase">
                        Syncing...
                    </span>
                </div>

                <div class="planet-badge-area flex flex-wrap gap-1.5 min-h-[28px] relative z-10">
                    <span class="text-[10px] font-mono text-slate-400 italic flex items-center">Loading Data...</span>
                </div>

                <div id="branch-container-{{ h_num }}" class="hidden border-t border-slate-200 pt-3 mt-1 flex flex-col gap-2 relative z-10 animate-fadeIn">
                    <div class="flex items-start gap-2 relative pl-3 before:absolute before:left-0 before:top-0 before:bottom-0 before:w-px before:bg-slate-200">
                        <div class="w-2 h-2 rounded-full bg-indigo-600 mt-1.5 -ml-[16.5px] border-2 border-white"></div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-mono uppercase tracking-wider text-slate-400">Lord / Ruler Matrix</span>
                            <span class="text-xs text-slate-700 font-mono">Sign Owner: <span id="lord-display-{{ h_num }}" class="text-indigo-600 font-bold">-</span></span>
                        </div>
                    </div>

                    <div class="flex items-start gap-2 relative pl-3 before:absolute before:left-0 before:top-0 before:bottom-0 before:w-px before:bg-slate-200">
                        <div class="w-2 h-2 rounded-full bg-emerald-600 mt-1.5 -ml-[16.5px] border-2 border-white"></div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-mono uppercase tracking-wider text-slate-400">Characteristics Elements</span>
                            <span class="text-xs text-slate-700">Geometric Classification: <span id="class-display-{{ h_num }}" class="text-emerald-600 font-mono">-</span></span>
                        </div>
                    </div>

                    <!-- <button onclick="triggerCrewAIAnalysis(event, {{ h_num }})" 
                            class="w-full mt-2 text-[10px] font-mono font-bold uppercase tracking-wider py-1.5 bg-slate-100 hover:bg-indigo-600 text-slate-700 hover:text-white border border-slate-200 hover:border-indigo-600 rounded-xl transition-all duration-200">
                        🧠 Initialize CrewAI Deep Agent Run
                    </button> -->
                </div>
            </div>
        {% endfor %}
    </div>
</div>
