<header class="border-b border-slate-800/80 bg-slate-950/70 backdrop-blur px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-50">
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6">
        <div class="flex items-center gap-3">
            <div class="h-8 w-1 bg-indigo-500 rounded-full shadow-[0_0_10px_rgba(99,102,241,0.5)]"></div>
            <div>
                <h1 class="text-base font-bold tracking-wider text-slate-200 uppercase font-mono">Jyotish Engine Core</h1>
                <p class="text-[11px] text-slate-500 font-mono mt-0.5">Computational Space • SwissEph Engine v2.10</p>
            </div>
        </div>

        <nav class="flex items-center gap-2 font-mono text-xs">
            <a href="/" 
               class="px-3 py-1.5 rounded-xl transition-all duration-150 {% if request.path == '/' %} bg-slate-900 text-white border border-slate-800 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 {% endif %}">
                📊 Dashboard
            </a>
            <a href="/database-explorer" 
               class="px-3 py-1.5 rounded-xl transition-all duration-150 {% if request.path == '/database-explorer' %} bg-slate-900 text-white border border-slate-800 {% else %} text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 {% endif %}">
                🗄️ Database Explorer
        </a>
        </nav>
    </div>
    
    
    <div id="audit-terminal" class="hidden p-4 bg-amber-50 text-amber-900 border-l-4 border-amber-400">
        </div>

    <div class="bg-indigo-950/40 border border-indigo-500/20 px-4 py-1.5 rounded-xl text-xs text-indigo-300 flex items-center gap-2 font-mono shadow-inner">
        <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span>
        Ascendant Coordinate: <span id="asc-display" class="font-bold text-white shadow-sm">{{ "%.4f"|format(asc_deg|default(0.0)) }}°</span>
    </div>
</header>
