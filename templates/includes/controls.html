<div class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-5 shadow-sm mb-6">
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 items-end">
        <div>
            <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-slate-400 mb-1">Year</label>
            <input type="number" id="input-year" value="{{ default_chart.year }}" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-sm font-mono text-slate-700 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-slate-400 mb-1">Month</label>
            <input type="number" id="input-month" value="{{ default_chart.month }}" min="1" max="12" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-sm font-mono text-slate-700 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-slate-400 mb-1">Day</label>
            <input type="number" id="input-day" value="{{ default_chart.day }}" min="1" max="31" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-sm font-mono text-slate-700 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-slate-400 mb-1">Birth Time</label>
            <input type="time" id="input-time" value="{{ default_chart.time }}" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-sm font-mono text-slate-700 focus:outline-none focus:border-indigo-500">
        </div>
        <div class="lg:col-span-2">
            <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-slate-400 mb-1">Target Place / City</label>
            <input type="text" id="input-place" value="{{ default_chart.place }}" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-sm font-mono text-slate-700 focus:outline-none focus:border-indigo-500" placeholder="e.g. Dubai, Kathmandu">
        </div>
    </div>

    <div class="mt-5 p-4 bg-white border border-slate-200 rounded-xl grid grid-cols-1 sm:grid-cols-4 gap-4 text-xs font-mono">
        <div class="flex flex-col gap-0.5">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Target Geo</span>
            <span class="text-slate-700 font-medium" id="telemetry-geo">Detecting Coordinates...</span>
        </div>
        <div class="flex flex-col gap-0.5">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Temporal Input</span>
            <span class="text-slate-700 font-medium" id="telemetry-time">1992-12-17 @ 04:00 Local</span>
        </div>
        <div class="flex flex-col gap-0.5">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Resolved Timezone</span>
            <span class="text-emerald-600 font-bold" id="telemetry-tz">Detecting Zone...</span>
        </div>
        <div class="flex flex-col gap-0.5">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Calculated Lagna</span>
            <span class="text-indigo-600 font-bold" id="controls-asc-display">Calculating...</span>
        </div>
    </div>

    <div class="mt-4 pt-4 border-t border-slate-200 flex justify-end">
        <button onclick="onControlFormSubmit()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-mono text-xs font-bold uppercase tracking-wider rounded-xl transition-all duration-150 shadow-sm">
            🔄 Recalculate Ephemeris Matrix
        </button>
    </div>
</div>

<script>
    function onControlFormSubmit() {
        const payload = {
            place: document.getElementById('input-place').value,
            year: parseInt(document.getElementById('input-year').value),
            month: parseInt(document.getElementById('input-month').value),
            day: parseInt(document.getElementById('input-day').value),
            time: document.getElementById('input-time').value // Sends clean "HH:MM" tracking string parameters
        };
        
        calculateNewChart(payload);
    }
    
    window.addEventListener('DOMContentLoaded', () => { onControlFormSubmit(); });
</script>
