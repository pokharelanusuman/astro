<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Jyotish Core Intelligence Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: { 
                    slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 950: '#0f172a' } 
                }
            }
        }
    }
</script>

<script>
    let activeHouse = null;

    function toggleHouseTree(houseNum) {
        if (activeHouse && activeHouse !== houseNum) {
            const oldBranch = document.getElementById(`branch-container-${activeHouse}`);
            if (oldBranch) oldBranch.classList.add('hidden');
            
            const oldCard = document.getElementById(`house-card-${activeHouse}`);
            if (oldCard) {
                oldCard.classList.remove('ring-2', 'ring-indigo-600', 'bg-white');
                oldCard.classList.add('bg-slate-50');
            }
        }

        const container = document.getElementById(`branch-container-${houseNum}`);
        const card = document.getElementById(`house-card-${houseNum}`);
        
        if (container && container.classList.contains('hidden')) {
            container.classList.remove('hidden');
            if (card) {
                card.classList.remove('bg-slate-50');
                card.classList.add('ring-2', 'ring-indigo-600', 'bg-white');
            }
            activeHouse = houseNum;
            
            const treeLog = document.getElementById('tree-container');
            if (treeLog) {
                treeLog.innerText = `House ${houseNum} Core Node Structural Parameters Loaded.\n- Rashi ID Placement Active\n- Planet Longitude Intersections Calculated Match`;
            }
        } else if (container) {
            container.classList.add('hidden');
            if (card) {
                card.classList.remove('ring-2', 'ring-indigo-600', 'bg-white');
                card.classList.add('bg-slate-50');
            }
            activeHouse = null;
        }
    }

    async function triggerCrewAIAnalysis(event, houseNum) {
        event.stopPropagation();
        const aiContainer = document.getElementById('ai-container');
        if (!aiContainer) return;

        aiContainer.innerHTML = `
            <div class="flex items-center gap-3 text-indigo-700 font-mono text-xs p-4 bg-indigo-50 border border-indigo-200 rounded-xl w-full">
                <svg class="animate-spin h-4 w-4 text-indigo-600" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Spawning CrewAI Orchestrator Pipeline. Local LLM analyzing House ${houseNum} branches...</span>
            </div>`;

        try {
            const response = await fetch(`/api/house/${houseNum}`);
            const data = await response.json();
            if (data.status === 'success') {
                aiContainer.innerHTML = `<div class="prose prose-slate text-xs sm:text-sm text-slate-800 font-sans leading-relaxed w-full">${data.ai_interpretation}</div>`;
            } else {
                aiContainer.innerHTML = `<span class="text-xs font-mono text-red-600">Analysis pipeline exception: ${data.message}</span>`;
            }
        } catch (err) {
            aiContainer.innerHTML = `<span class="text-xs font-mono text-red-600">Backend connectivity structural error: ${err}</span>`;
        }
    }

    async function calculateNewChart(formData = {}) {
        try {
            // Transform form data to API format
            const apiPayload = {
                year: formData.year,
                month: formData.month,
                day: formData.day,
                hour: formData.time || "12:00",
                place: formData.place
            };
            
            const response = await fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(apiPayload)
            });
            const apiResponse = await response.json();
            
            if (apiResponse.status === 'success') {
                const chartData = apiResponse.data;
                const signNames = ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"];
                
                // Parse timezone to get offset (e.g., "Asia/Kathmandu" -> +5.75)
                const tzString = chartData.timezone || "UTC";
                let tzOffset = 0;
                try {
                    const date = new Date();
                    const formatter = new Intl.DateTimeFormat('en-US', {
                        timeZone: tzString,
                        hour12: false,
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    // This is approximate - using the birth date for more accuracy
                    const birthDate = new Date(chartData.birth_data.year, chartData.birth_data.month - 1, chartData.birth_data.day);
                    tzOffset = (new Date().getTimezoneOffset() - new Date(formatter.format(birthDate)).getTimezoneOffset()) / 60;
                } catch (e) {
                    tzOffset = 0;
                }
                
                const prefix = tzOffset >= 0 ? "+" : "";
                const lat = chartData.birth_data.latitude;
                const lon = chartData.birth_data.longitude;
                const ascDeg = chartData.ascendant_degree;
                
                // Update Diagnostic Telemetry Fields
                const timeLog = document.getElementById('telemetry-time');
                if (timeLog) {
                    timeLog.textContent = `${formData.year}-${formData.month}-${formData.day} @ ${formData.time} Local`;
                }
                
                const tzLog = document.getElementById('telemetry-tz');
                if (tzLog) {
                    tzLog.textContent = `${tzString} (UTC${prefix}${tzOffset.toFixed(2)})`;
                }
                
                const geoLog = document.getElementById('telemetry-geo');
                if (geoLog) {
                    geoLog.textContent = `LAT: ${lat.toFixed(4)} | LON: ${lon.toFixed(4)}`;
                }
                
                const ascSignIndex = Math.floor(ascDeg / 30);
                const fullAscString = `${ascDeg.toFixed(4)}° (${signNames[ascSignIndex]})`;
                
                if (document.getElementById('controls-asc-display')) {
                    document.getElementById('controls-asc-display').innerText = fullAscString;
                }
                if (document.getElementById('asc-display')) {
                    document.getElementById('asc-display').innerText = `${ascDeg.toFixed(4)}°`;
                }

                // Update house cards with planet mapping
                for (let h = 1; h <= 12; h++) {
                    const planetsInHouse = chartData.house_mapping[h.toString()] || [];
                    
                    const planetContainer = document.querySelector(`#house-card-${h} .planet-badge-area`);
                    if (planetContainer) {
                        if (planetsInHouse.length > 0) {
                            planetContainer.innerHTML = planetsInHouse.map(p => `
                                <span class="text-[10px] font-mono font-bold bg-white text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded-md shadow-sm">
                                    🪐 ${p.substring(0, 3)}
                                </span>
                            `).join('');
                        } else {
                            planetContainer.innerHTML = `<span class="text-[10px] font-mono text-slate-400 italic flex items-center">Empty House</span>`;
                        }
                    }
                }
            } else {
                alert("Calculation Engine Failure: " + apiResponse.message);
            }
        } catch (err) {
            console.error("Failed to sync calculation matrix updates:", err);
        }
    }
</script>
